services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: relay
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay-local-only
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - relay_postgres_data:/var/lib/postgresql/data

volumes:
  relay_postgres_data:

groups:
  - name: cosmos-api-slo
    interval: 30s
    rules:
      - record: cosmos:http_requests:rate5m
        expr: sum by (cluster, environment, service) (rate(cosmos_http_requests_total{route!="/api/health",route!="/api/metrics"}[5m]))
      - record: cosmos:http_5xx:ratio5m
        expr: sum by (cluster, environment, service) (rate(cosmos_http_requests_total{status_class="5xx",route!="/api/health",route!="/api/metrics"}[5m])) / clamp_min(cosmos:http_requests:rate5m, 0.001)
      - record: cosmos:http_5xx:ratio1h
        expr: sum by (cluster, environment, service) (rate(cosmos_http_requests_total{status_class="5xx",route!="/api/health",route!="/api/metrics"}[1h])) / clamp_min(sum by (cluster, environment, service) (rate(cosmos_http_requests_total{route!="/api/health",route!="/api/metrics"}[1h])), 0.001)
      - alert: CosmosApiTargetDown
        expr: up{job="cosmos-api"} == 0
        for: 2m
        labels:
          severity: page
          service: cosmos-api
        annotations:
          summary: Cosmos API metrics target is unavailable
          runbook: docs/observability-slo-runbook.md#cosmosapitargetdown
      - alert: CosmosApiAvailabilityFastBurn
        expr: cosmos:http_requests:rate5m > 0.1 and cosmos:http_5xx:ratio5m > 0.0144 and cosmos:http_5xx:ratio1h > 0.0144
        for: 5m
        labels:
          severity: page
          service: cosmos-api
          slo: availability
        annotations:
          summary: Cosmos API is rapidly consuming the 99.9% availability error budget
          runbook: docs/observability-slo-runbook.md#cosmosapiavailabilityfastburn
      - alert: CosmosApiLatencyP95High
        expr: histogram_quantile(0.95, sum by (cluster, environment, service, le) (rate(cosmos_http_request_duration_ms_bucket{route!="/api/health",route!="/api/metrics"}[10m]))) > 500
        for: 10m
        labels:
          severity: ticket
          service: cosmos-api
          slo: latency
        annotations:
          summary: Cosmos API p95 latency exceeds 500 milliseconds
          runbook: docs/observability-slo-runbook.md#cosmosapilatencyp95high
      - alert: CosmosSseConnectionCapacityHigh
        expr: max by (cluster, environment, service, instance) (cosmos_sse_connections_active) / clamp_min(max by (cluster, environment, service, instance) (cosmos_sse_connections_limit), 1) > 0.9
        for: 10m
        labels:
          severity: ticket
          service: cosmos-api
          slo: sse-capacity
        annotations:
          summary: Cosmos SSE connections exceed 90% of the configured per-instance limit
          runbook: docs/observability-slo-runbook.md#cosmossseconnectioncapacityhigh
      - alert: CosmosWorkerExecutionUnavailable
        expr: max by (cluster, environment, service) (cosmos_execution_enabled) == 1 and max by (cluster, environment, service) (cosmos_worker_execution_ready) == 0
        for: 2m
        labels:
          severity: page
          service: cosmos-worker
          slo: execution-readiness
        annotations:
          summary: Cosmos execution is enabled but no recent Worker heartbeat is available
          runbook: docs/observability-slo-runbook.md#cosmosworkerexecutionunavailable
      - alert: CosmosCommandQueueAgeHigh
        expr: max by (cluster, environment, service) (cosmos_observer_commands_oldest_age_seconds{status=~"accepted|queued|running"}) > 300 and sum by (cluster, environment, service) (cosmos_observer_commands_total{status=~"accepted|queued|running"}) > 0
        for: 10m
        labels:
          severity: ticket
          service: cosmos-worker
          slo: queue-age
        annotations:
          summary: Cosmos command queue has active work older than five minutes
          runbook: docs/observability-slo-runbook.md#cosmoscommandqueueagehigh
      - alert: CosmosOutboxLagHigh
        expr: max by (cluster, environment, service) (cosmos_observer_outbox_oldest_age_seconds{stream=~"session|environment|automation|space"}) > 300 and sum by (cluster, environment, service) (cosmos_observer_outbox_pending_total{stream=~"session|environment|automation|space"}) > 0
        for: 10m
        labels:
          severity: ticket
          service: cosmos-worker
          slo: outbox-lag
        annotations:
          summary: Cosmos has unpublished Outbox work older than five minutes
          runbook: docs/observability-slo-runbook.md#cosmosoutboxlaghigh
      - alert: CosmosObserverWorkerHeartbeatStale
        expr: sum by (cluster, environment, service) (cosmos_observer_workers_total{state="fresh"}) == 0 and sum by (cluster, environment, service) (cosmos_observer_workers_total{state="stale"}) > 0
        for: 5m
        labels:
          severity: ticket
          service: cosmos-worker
          slo: worker-heartbeat
        annotations:
          summary: All observed Worker heartbeats are stale
          runbook: docs/observability-slo-runbook.md#cosmosobserverworkerheartbeatstale

openapi: 3.1.0
info:
  title: Relay Agent OS API
  version: 0.2.0
  summary: Multi-tenant control-plane and Session API for Relay.
  description: |
    Contract for the Relay prototype backend. A Session is a persistent conversation;
    a Turn is one queued unit of Agent work; an Attempt is one execution of a Turn.
    Expert and Environment revisions are immutable once used by a Session.

    This file contains the target API surface. Operations not marked with
    `x-relay-implementation-status` are design contracts and must not be exposed
    as implemented. The current Session slice marks its implementation status
    explicitly and is runtime-validated by `@relay/contracts`.

    All timestamps are UTC RFC 3339. All list endpoints use opaque cursor pagination.
    POST operations that create a resource, enqueue a command, or cause an external
    side effect require `Idempotency-Key`. PATCH and one-time decisions require
    `If-Match` where documented.
  contact:
    name: Relay Engineering
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: https://api.relay.example/api/v1
    description: Production
  - url: http://127.0.0.1:8787/api/v1
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Identity
    description: Authenticated actor discovery and accessible Organization and Space memberships.
  - name: Organizations
    description: Tenant identity, lifecycle, region, and retention policy.
  - name: Spaces
    description: Resource boundaries, defaults, membership scope, and migration.
  - name: Experts
    description: Stable Expert identities and immutable executable revisions.
  - name: Environments
    description: Cloud or daemon execution templates and immutable revisions.
  - name: Sessions
    description: Persistent Expert conversations, messages, sharing, and lifecycle commands.
  - name: Turns
    description: FIFO units of Agent work and their retry Attempts.
  - name: Workers
    description: Delegated child Agent work within a parent Session.
  - name: ToolCalls
    description: Redacted, policy-controlled calls to external capabilities.
  - name: Files
    description: Read-only browsing of Workspace, User, and Organization Files and versions.
  - name: Artifacts
    description: Searchable Session deliverables and external references.
  - name: Automations
    description: Management projections over the canonical Triggers stored in Expert revisions.
  - name: Events
    description: Immutable external inputs, matching, dispatch, and replay diagnostics.
  - name: Subscriptions
    description: Runtime listeners that deliver future Events into an existing Session.
  - name: Approvals
    description: Human decisions that gate an exact high-risk ToolCall input.

paths:
  /capabilities:
    get:
      tags: [Identity]
      operationId: getRuntimeCapabilities
      x-relay-implementation-status: implemented
      summary: Discover deployment runtime capabilities
      description: |
        `execution.enabled` is true only when execution is configured and the database
        contains a sufficiently recent Worker heartbeat. API control-plane reads remain
        available when execution is unavailable.
      responses:
        '200':
          description: Authenticated deployment capabilities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeCapabilities'
        '401':
          $ref: '#/components/responses/RuntimeUnauthorized'
        '500':
          $ref: '#/components/responses/RuntimeInternalError'

  /me:
    get:
      tags: [Identity]
      operationId: getCurrentActor
      x-relay-implementation-status: implemented
      summary: Discover the authenticated actor and accessible workspaces
      description: |
        Returns the authenticated actor and only the Organization and Space memberships
        currently visible to that actor. Organization and Space IDs are unique within
        their respective arrays.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated actor and accessible memberships
          headers:
            Cache-Control:
              description: Prevents identity and authorization data from being cached.
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/RuntimeUnauthorized'
        '500':
          $ref: '#/components/responses/RuntimeInternalError'

  /organizations/{organizationId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Organizations]
      operationId: getOrganization
      summary: Get an organization
      responses:
        '200':
          description: Organization
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Organizations]
      operationId: updateOrganization
      summary: Update an organization
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/OrganizationPatch'
      responses:
        '200':
          description: Updated organization
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /organizations/{organizationId}/spaces:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Spaces]
      operationId: listSpaces
      summary: List accessible spaces
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Space page
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Space'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Spaces]
      operationId: createSpace
      summary: Create a space
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpaceCreate'
      responses:
        '201':
          description: Space created
          headers:
            Location:
              $ref: '#/components/headers/Location'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Space'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organizationId}/spaces/{spaceId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
    get:
      tags: [Spaces]
      operationId: getSpace
      summary: Get a space
      responses:
        '200':
          description: Space
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Space'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Spaces]
      operationId: updateSpace
      summary: Update defaults or metadata for a space
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/SpacePatch'
      responses:
        '200':
          description: Updated space
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Space'
        '400':
          $ref: '#/components/responses/BadRequest'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      tags: [Spaces]
      operationId: deleteSpace
      summary: Migrate resources and delete a non-default space
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - name: migrationTargetSpaceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          $ref: '#/components/responses/CommandAccepted'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /organizations/{organizationId}/spaces/{spaceId}/experts:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
    get:
      tags: [Experts]
      operationId: listExperts
      x-relay-implementation-status: implemented
      summary: List Experts visible to the caller
      description: |
        Returns at most 100 Experts in stable `updatedAt DESC, id DESC` order.
        Private Experts are visible only to their creator. Effective Viewers can
        read only Published Experts; service accounts are rejected with 403.
      parameters:
        - $ref: '#/components/parameters/RuntimeOrganizationId'
        - $ref: '#/components/parameters/RuntimeSpaceId'
        - $ref: '#/components/parameters/RuntimeCatalogCursor'
        - $ref: '#/components/parameters/RuntimeCatalogLimit'
      responses:
        '200':
          description: Expert page
          headers:
            Cache-Control:
              $ref: '#/components/headers/PrivateNoStore'
            Vary:
              $ref: '#/components/headers/VaryAuthorization'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeExpertListResponse'
        '400':
          $ref: '#/components/responses/RuntimeCatalogBadRequest'
        '401':
          $ref: '#/components/responses/RuntimeCatalogUnauthorized'
        '403':
          $ref: '#/components/responses/RuntimeCatalogForbidden'
        '404':
          $ref: '#/components/responses/RuntimeCatalogNotFound'
        '500':
          $ref: '#/components/responses/RuntimeCatalogInternalError'
    post:
      tags: [Experts]
      operationId: createExpert
      summary: Create a Custom Expert draft or managed-template customization
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpertCreate'
      responses:
        '201':
          description: Expert created
          headers:
            Location:
              $ref: '#/components/headers/Location'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expert'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organizationId}/spaces/{spaceId}/experts/{expertId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/ExpertId'
    get:
      tags: [Experts]
      operationId: getExpert
      x-relay-implementation-status: implemented
      summary: Get an Expert and its current published revision
      description: |
        Private Experts are concealed from non-creators. Effective Viewers can
        read only Published Experts; service accounts are rejected with 403.
      parameters:
        - $ref: '#/components/parameters/RuntimeOrganizationId'
        - $ref: '#/components/parameters/RuntimeSpaceId'
        - $ref: '#/components/parameters/RuntimeExpertId'
      responses:
        '200':
          description: Expert
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            Cache-Control:
              $ref: '#/components/headers/PrivateNoStore'
            Vary:
              $ref: '#/components/headers/VaryAuthorization'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeExpertDetail'
        '400':
          $ref: '#/components/responses/RuntimeCatalogBadRequest'
        '401':
          $ref: '#/components/responses/RuntimeCatalogUnauthorized'
        '403':
          $ref: '#/components/responses/RuntimeCatalogForbidden'
        '404':
          $ref: '#/components/responses/RuntimeCatalogNotFound'
        '500':
          $ref: '#/components/responses/RuntimeCatalogInternalError'
    patch:
      tags: [Experts]
      operationId: updateExpertDraft
      summary: Update the mutable draft revision
      description: Managed-template base instructions cannot be changed by this operation.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/ExpertPatch'
      responses:
        '200':
          description: Updated Expert draft
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expert'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      tags: [Experts]
      operationId: archiveExpert
      summary: Archive an Expert
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Expert archived
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /organizations/{organizationId}/spaces/{spaceId}/experts/{expertId}/publish:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/ExpertId'
    post:
      tags: [Experts]
      operationId: publishExpert
      summary: Validate and publish the current draft as an immutable revision
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '201':
          description: Published revision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpertRevision'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /organizations/{organizationId}/spaces/{spaceId}/experts/{expertId}/revisions:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/ExpertId'
    get:
      tags: [Experts]
      operationId: listExpertRevisions
      summary: List immutable Expert revisions
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Expert revision page
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExpertRevision'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/spaces/{spaceId}/environments:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
    get:
      tags: [Environments]
      operationId: listEnvironments
      x-relay-implementation-status: implemented
      summary: List Environments visible in the Space
      description: |
        Returns at most 100 Space-visible Environments in stable
        `updatedAt DESC, id DESC` order. Effective Viewers can read only Ready
        Environments; service accounts are rejected with 403.
      parameters:
        - $ref: '#/components/parameters/RuntimeOrganizationId'
        - $ref: '#/components/parameters/RuntimeSpaceId'
        - $ref: '#/components/parameters/RuntimeCatalogCursor'
        - $ref: '#/components/parameters/RuntimeCatalogLimit'
      responses:
        '200':
          description: Environment page
          headers:
            Cache-Control:
              $ref: '#/components/headers/PrivateNoStore'
            Vary:
              $ref: '#/components/headers/VaryAuthorization'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeEnvironmentListResponse'
        '400':
          $ref: '#/components/responses/RuntimeCatalogBadRequest'
        '401':
          $ref: '#/components/responses/RuntimeCatalogUnauthorized'
        '403':
          $ref: '#/components/responses/RuntimeCatalogForbidden'
        '404':
          $ref: '#/components/responses/RuntimeCatalogNotFound'
        '500':
          $ref: '#/components/responses/RuntimeCatalogInternalError'
    post:
      tags: [Environments]
      operationId: createEnvironment
      summary: Create and provision an Environment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnvironmentCreate'
      responses:
        '202':
          description: Environment and provisioning command accepted
          content:
            application/json:
              schema:
                type: object
                required: [environment, command]
                properties:
                  environment:
                    $ref: '#/components/schemas/Environment'
                  command:
                    $ref: '#/components/schemas/Command'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organizationId}/spaces/{spaceId}/environments/{environmentId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/EnvironmentId'
    get:
      tags: [Environments]
      operationId: getEnvironment
      x-relay-implementation-status: implemented
      summary: Get an Environment
      description: |
        Returns the Space-visible Environment and safe repository bindings for
        its current Ready revision. Effective Viewers cannot read non-Ready
        Environments; service accounts are rejected with 403.
      parameters:
        - $ref: '#/components/parameters/RuntimeOrganizationId'
        - $ref: '#/components/parameters/RuntimeSpaceId'
        - $ref: '#/components/parameters/RuntimeEnvironmentId'
      responses:
        '200':
          description: Environment
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            Cache-Control:
              $ref: '#/components/headers/PrivateNoStore'
            Vary:
              $ref: '#/components/headers/VaryAuthorization'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeEnvironmentDetail'
        '400':
          $ref: '#/components/responses/RuntimeCatalogBadRequest'
        '401':
          $ref: '#/components/responses/RuntimeCatalogUnauthorized'
        '403':
          $ref: '#/components/responses/RuntimeCatalogForbidden'
        '404':
          $ref: '#/components/responses/RuntimeCatalogNotFound'
        '500':
          $ref: '#/components/responses/RuntimeCatalogInternalError'
    patch:
      tags: [Environments]
      operationId: updateEnvironment
      summary: Create and provision a new immutable Environment revision
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/EnvironmentPatch'
      responses:
        '202':
          description: Update accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Command'
        '400':
          $ref: '#/components/responses/BadRequest'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      tags: [Environments]
      operationId: deleteEnvironment
      summary: Schedule deletion of an unreferenced Environment
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          $ref: '#/components/responses/CommandAccepted'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organizationId}/spaces/{spaceId}/sessions:
    parameters:
      - $ref: '#/components/parameters/RuntimeOrganizationId'
      - $ref: '#/components/parameters/RuntimeSpaceId'
    get:
      tags: [Sessions]
      operationId: listSessions
      x-relay-implementation-status: implemented
      summary: List Sessions visible to the caller
      description: |
        Returns a stable keyset-paginated projection ordered by latest activity. Cursors
        are tenant- and filter-scoped and cannot be reused with another query.
      parameters:
        - name: cursor
          in: query
          description: Opaque cursor returned by the previous page for this tenant and filter set.
          schema:
            type: string
            minLength: 1
            maxLength: 4096
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SessionStatus'
        - name: archived
          in: query
          description: Select active, archived, or all Sessions. Defaults to false.
          schema:
            type: string
            enum: ['true', 'false', all]
        - name: search
          in: query
          description: Case-insensitive literal search over title, summary, Expert, and repository.
          schema:
            type: string
            minLength: 1
            maxLength: 200
      responses:
        '200':
          description: Session page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSessionListResponse'
        '400':
          $ref: '#/components/responses/RuntimeBadRequest'
        '401':
          $ref: '#/components/responses/RuntimeUnauthorized'
        '403':
          $ref: '#/components/responses/RuntimeForbidden'
        '404':
          $ref: '#/components/responses/RuntimeNotFound'
        '500':
          $ref: '#/components/responses/RuntimeInternalError'
    post:
      tags: [Sessions]
      operationId: createSession
      x-relay-implementation-status: implemented
      summary: Create a draft or queued Session from a published Expert
      description: |
        `start=true` atomically creates the Session, first user Message and first Turn.
        The server resolves and fixes the published Expert and Environment revisions.
        `start=false` persists the draft Session and first user Message, but creates no
        Turn, Command, or execution Outbox event. A `start=true` request returns 503 with
        `EXECUTION_UNAVAILABLE` when execution is disabled or no Worker heartbeat is fresh.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeSessionCreate'
      responses:
        '201':
          description: Session created
          headers:
            Location:
              $ref: '#/components/headers/Location'
            ETag:
              $ref: '#/components/headers/ETag'
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSessionCreateResult'
        '400':
          $ref: '#/components/responses/RuntimeBadRequest'
        '401':
          $ref: '#/components/responses/RuntimeUnauthorized'
        '403':
          $ref: '#/components/responses/RuntimeForbidden'
        '404':
          $ref: '#/components/responses/RuntimeNotFound'
        '409':
          $ref: '#/components/responses/RuntimeConflict'
        '413':
          $ref: '#/components/responses/RuntimePayloadTooLarge'
        '422':
          $ref: '#/components/responses/RuntimeUnprocessable'
        '500':
          $ref: '#/components/responses/RuntimeInternalError'
        '503':
          $ref: '#/components/responses/RuntimeServiceUnavailable'

  /organizations/{organizationId}/spaces/{spaceId}/sessions/{sessionId}:
    parameters:
      - $ref: '#/components/parameters/RuntimeOrganizationId'
      - $ref: '#/components/parameters/RuntimeSpaceId'
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Sessions]
      operationId: getSession
      x-relay-implementation-status: implemented
      summary: Get a Session
      responses:
        '200':
          description: Session
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            Cache-Control:
              description: Private responses are never stored by shared or browser caches.
              schema:
                type: string
                const: private, no-store
            Vary:
              description: Prevents credentials from sharing a cached representation.
              schema:
                type: string
                const: Authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSession'
        '400':
          $ref: '#/components/responses/RuntimeBadRequest'
        '401':
          $ref: '#/components/responses/RuntimeUnauthorized'
        '403':
          $ref: '#/components/responses/RuntimeForbidden'
        '404':
          $ref: '#/components/responses/RuntimeNotFound'
        '500':
          $ref: '#/components/responses/RuntimeInternalError'
    patch:
      tags: [Sessions]
      operationId: renameSession
      x-relay-implementation-status: implemented
      summary: Rename a Session
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/RuntimeSessionRename'
      responses:
        '200':
          description: Updated Session
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSession'
        '400':
          $ref: '#/components/responses/RuntimeBadRequest'
        '401':
          $ref: '#/components/responses/RuntimeUnauthorized'
        '403':

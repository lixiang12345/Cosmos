    JsonObject:
      type: object
      additionalProperties: true
      maxProperties: 128
    RuntimeIdentifier:
      type: string
      description: Opaque runtime identifier; UUID format is not required.
      minLength: 1
      maxLength: 128
    RuntimeActorIdentifier:
      type: string
      description: Opaque user, service-account, worker, or system actor identifier.
      minLength: 1
      maxLength: 256
    RuntimeApiError:

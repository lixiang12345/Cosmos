  /organizations/{organizationId}/spaces/{spaceId}/sessions/{sessionId}/events/stream:
    parameters:
      - $ref: '#/components/parameters/RuntimeOrganizationId'
      - $ref: '#/components/parameters/RuntimeSpaceId'
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Sessions]
      operationId: streamSessionEvents
      x-relay-implementation-status: implemented
      summary: Stream ordered Session events
      description: |
        Server-Sent Events. Reconnect with `Last-Event-ID`. Delivery is at least once;
        clients deduplicate by eventId and apply by monotonically increasing sequence.
        Event IDs are opaque, scope-bound cursors and must only be replayed to this URL.
        Each API instance enforces concurrent connection budgets globally, per actor, and
        per Session. A request that cannot acquire all three budgets receives 429 before
        the response is upgraded to an event stream.
      parameters:
        - $ref: '#/components/parameters/SessionTimelineCursor'
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 2048
      responses:
        '200':
          description: SSE event stream
          headers:
            Cache-Control:
              schema:
                type: string
                const: private, no-cache, no-store, no-transform
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                event:
                  value: |-
                    id: eyJvcmdhbml6YXRpb25JZCI6InJlbGF5Iiwic3BhY2VJZCI6InBsYXRmb3JtIiwic2Vzc2lvbklkIjoic2Vzc2lvbi0xIiwic2VxdWVuY2UiOjQyfQ
                    event: session.updated
                    data: {"organizationId":"relay","spaceId":"platform","sessionId":"session-1","eventId":"event-42","sequence":42,"type":"session.updated","resourceType":"session","resourceId":"session-1","actorId":"worker-1","commandId":"command-1","requestId":"request-1","occurredAt":"2026-07-12T08:00:00Z","payload":{"status":"active","version":2}}
        '400':
          $ref: '#/components/responses/RuntimeBadRequest'
        '401':
          $ref: '#/components/responses/RuntimeUnauthorized'
        '403':
          $ref: '#/components/responses/RuntimeForbidden'
        '404':
          $ref: '#/components/responses/RuntimeNotFound'
        '429':
          $ref: '#/components/responses/RuntimeTooManyRequests'
        '500':
          $ref: '#/components/responses/RuntimeInternalError'


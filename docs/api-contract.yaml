    RuntimeSession:
      type: object
      required:
        - id
        - organizationId
        - spaceId
        - title
        - summary
        - expertId
        - expertName
        - configurationResolutionVersion
        - repository
        - baseBranch
        - visibility
        - status
        - attachments
        - source
        - createdAt
        - updatedAt
        - lastActivityAt
        - archivedAt
        - version
      properties:
        id:
          $ref: '#/components/schemas/RuntimeIdentifier'
        organizationId:
          $ref: '#/components/schemas/RuntimeIdentifier'
        spaceId:
          $ref: '#/components/schemas/RuntimeIdentifier'
        title:
          type: string
          minLength: 1
          maxLength: 240
        summary:
          type: string
          maxLength: 100000
        expertId:
          $ref: '#/components/schemas/RuntimeIdentifier'
        expertName:
          type: string
          minLength: 1
          maxLength: 160
        expertVersion:
          type: integer
          minimum: 1
        environmentId:
          $ref: '#/components/schemas/RuntimeIdentifier'
        configurationResolutionVersion:
          type: integer
          enum: [0, 1]
          description: Version 0 is migration-only legacy data; every new Session is version 1.
        expertRevisionId:
          $ref: '#/components/schemas/RuntimeIdentifier'
        environmentRevisionId:
          $ref: '#/components/schemas/RuntimeIdentifier'
        executionSnapshotId:
          $ref: '#/components/schemas/RuntimeIdentifier'
        repositoryId:
          $ref: '#/components/schemas/RuntimeIdentifier'
        repository:
          type: string
          minLength: 1
          maxLength: 512
        baseBranch:
          type: string
          minLength: 1
          maxLength: 255
        visibility:
          $ref: '#/components/schemas/SessionVisibility'
        status:
          $ref: '#/components/schemas/SessionStatus'
        attachments:
          type: array
          maxItems: 10
          items:
            type: string
            minLength: 1
            maxLength: 2048
        source:
          type: string
          enum: [manual, automation]
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'
        lastActivityAt:
          $ref: '#/components/schemas/Timestamp'
        archivedAt:
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
        version:
          type: integer
          minimum: 1
      additionalProperties: false
      allOf:
        - if:
            properties:
              configurationResolutionVersion:
                const: 1
            required: [configurationResolutionVersion]
          then:
            properties:
              expertRevisionId: {}
              environmentRevisionId: {}
              executionSnapshotId: {}
              repositoryId: {}
            required: [expertRevisionId, environmentRevisionId, executionSnapshotId, repositoryId]
        - if:
            properties:
              configurationResolutionVersion:
                const: 0
            required: [configurationResolutionVersion]
          then:
            not:
              anyOf:
                - properties:
                    expertRevisionId: {}
                  required: [expertRevisionId]
                - properties:
                    environmentRevisionId: {}
                  required: [environmentRevisionId]
                - properties:
                    executionSnapshotId: {}
                  required: [executionSnapshotId]
                - properties:
                    repositoryId: {}
                  required: [repositoryId]

    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/ApprovalId'
    get:
      tags: [Approvals]
      operationId: getApproval
      summary: Get an Approval and redacted evidence
      responses:
        '200':
          description: Approval
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Approval'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/spaces/{spaceId}/approvals/{approvalId}/decision:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/ApprovalId'
    post:
      tags: [Approvals]
      operationId: decideApproval
      summary: Atomically decide a pending Approval
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecision'
      responses:
        '200':
          description: Decided Approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Approval'
        '409':
          description: Approval already decided or invalid transition
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SpaceId:
      name: spaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExpertId:
      name: expertId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EnvironmentId:
      name: environmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TurnId:
      name: turnId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FileId:
      name: fileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ArtifactId:
      name: artifactId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AutomationId:
      name: automationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubscriptionId:
      name: subscriptionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApprovalId:
      name: approvalId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque, signed cursor returned by the previous page.
      schema:
        type: string
        maxLength: 2048
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    Search:
      name: search
      in: query
      required: false
      schema:
        type: string
        maxLength: 256
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Unique key scoped to organization, actor, method, and canonical path. Retained
        for at least 24 hours. Reuse with a different request body returns 409.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[\x21-\x7E]+$'
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: ETag from the last successful GET; required for optimistic concurrency.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'

  headers:
    ETag:
      description: Quoted integer resource version.
      schema:
        type: string
        example: '"7"'
    Location:
      description: Canonical URL of the created resource.
      schema:
        type: string
        format: uri-reference
    RequestId:
      description: Correlation ID for logs and support.
      schema:
        type: string
    IdempotencyReplayed:
      description: True when the server replayed a stored idempotent response.
      schema:
        type: boolean

  responses:
    BadRequest:
      description: Validation failed
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Permission denied
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource not found or intentionally concealed by authorization
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Resource conflict, invalid state transition, or idempotency-key reuse
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    PreconditionFailed:
      description: If-Match does not equal the current resource version
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unprocessable:
      description: Semantic precondition such as unpublished Expert or unready Environment failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    PayloadTooLarge:
      description: Request or attachment exceeds the configured limit
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    CommandAccepted:
      description: Durable asynchronous command accepted
      headers:
        Idempotency-Replayed:
          $ref: '#/components/headers/IdempotencyReplayed'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Command'

  schemas:
    Timestamp:
      type: string
      format: date-time
      examples: ['2026-07-12T08:00:00Z']
    JsonObject:
      type: object
      additionalProperties: true
      maxProperties: 128
    ResourceBase:
      type: object
      required: [id, organizationId, createdAt, updatedAt, version]
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'
        version:
          type: integer
          minimum: 1
        metadata:
          $ref: '#/components/schemas/JsonObject'
    Page:
      type: object
      required: [page]
      properties:
        page:
          type: object
          required: [hasMore]
          properties:
            nextCursor:
              type: [string, 'null']
            hasMore:
              type: boolean
            projectionUpdatedAt:
              type: [string, 'null']
              format: date-time
    FieldError:
      type: object
      required: [reason]
      properties:
        field:
          type: string
        reason:
          type: string
        code:
          type: string
    Problem:
      type: object
      required: [type, title, status, code, requestId]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        code:
          type: string
          enum:
            - VALIDATION_FAILED
            - AUTHENTICATION_REQUIRED
            - PERMISSION_DENIED
            - RESOURCE_NOT_FOUND
            - RESOURCE_CONFLICT
            - PRECONDITION_REQUIRED
            - VERSION_MISMATCH
            - INVALID_STATE_TRANSITION
            - IDEMPOTENCY_KEY_REUSED
            - RATE_LIMITED
            - QUOTA_EXCEEDED
            - APPROVAL_REQUIRED
            - APPROVAL_ALREADY_DECIDED
            - ENVIRONMENT_NOT_READY
            - EXPERT_NOT_PUBLISHED
            - EVENT_SIGNATURE_INVALID
            - EVENT_DUPLICATE
            - PAYLOAD_TOO_LARGE
            - INTERNAL_ERROR
            - DEPENDENCY_UNAVAILABLE
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        requestId:
          type: string
        retryAfterSeconds:
          type: integer
          minimum: 0
        currentState:
          type: string
        allowedActions:
          type: array
          items:
            type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    Command:
      type: object
      required: [id, type, status, resourceType, resourceId, acceptedAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        status:
          type: string
          enum: [accepted, queued, running, succeeded, failed, canceled]
        resourceType:
          type: string
        resourceId:
          type: string
          format: uuid
        queuePosition:
          type: integer
          minimum: 0
        acceptedAt:
          $ref: '#/components/schemas/Timestamp'

    OrganizationRole:
      type: string
      enum: [organization_owner, organization_admin, member, viewer]
    SpaceRole:
      type: string
      enum: [space_manager, member, viewer]
    MeActor:
      type: object
      required: [id, kind]
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 256
        kind:
          type: string
          enum: [user, service_account]
      additionalProperties: false
    MeSpace:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 128
        name:
          type: string
          minLength: 1
          maxLength: 160
        role:
          $ref: '#/components/schemas/SpaceRole'
      additionalProperties: false
    MeOrganization:
      type: object
      required: [id, name, role, spaces]
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 128
        name:
          type: string
          minLength: 1
          maxLength: 160
        role:
          $ref: '#/components/schemas/OrganizationRole'
        spaces:
          type: array
          description: Space IDs are unique within this Organization.
          maxItems: 10000
          uniqueItems: true
          items:
            $ref: '#/components/schemas/MeSpace'
      additionalProperties: false
    MeResponse:
      type: object
      required: [actor, organizations]
      properties:
        actor:
          $ref: '#/components/schemas/MeActor'
        organizations:
          type: array
          description: Organization IDs are unique.
          maxItems: 1000
          uniqueItems: true
          items:
            $ref: '#/components/schemas/MeOrganization'
      additionalProperties: false

    Organization:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [name, slug, status, defaultSpaceId, region]
          properties:
            name:
              type: string
            slug:
              type: string
            status:
              type: string
              enum: [active, suspended, deleting]
            defaultSpaceId:
              type: string
              format: uuid
            region:
              type: string
            retentionPolicyId:
              type: [string, 'null']
              format: uuid
    OrganizationPatch:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        retentionPolicyId:
          type: [string, 'null']
          format: uuid
      additionalProperties: false

    Space:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [name, slug, description, isDefault, status]
          properties:
            name:
              type: string
            slug:
              type: string
            description:
              type: string
            isDefault:
              type: boolean
            status:
              type: string
              enum: [active, migrating, archived]
            defaultExpertId:
              type: [string, 'null']
              format: uuid
            defaultEnvironmentId:
              type: [string, 'null']
              format: uuid
            settings:
              $ref: '#/components/schemas/JsonObject'
    SpaceCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        slug:
          type: string
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        description:
          type: string
          maxLength: 2000
        defaultExpertId:
          type: string
          format: uuid
        defaultEnvironmentId:
          type: string
          format: uuid
      additionalProperties: false
    SpacePatch:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 2000
        defaultExpertId:
          type: [string, 'null']
          format: uuid
        defaultEnvironmentId:
          type: [string, 'null']
          format: uuid
        settings:
          $ref: '#/components/schemas/JsonObject'
      additionalProperties: false

    ExpertStatus:
      type: string
      enum: [draft, published, disabled, archived]
    ExpertKind:
      type: string
      enum: [managed_template, custom, built_in]
    Expert:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [spaceId, kind, name, description, status, visibility]
          properties:
            spaceId:
              type: string
              format: uuid
            kind:
              $ref: '#/components/schemas/ExpertKind'
            name:
              type: string
            description:
              type: string
            status:
              $ref: '#/components/schemas/ExpertStatus'
            visibility:
              type: string
              enum: [private, space]
            publishedRevisionId:
              type: [string, 'null']
              format: uuid
            draftRevisionId:
              type: [string, 'null']
              format: uuid
            upstreamTemplateId:
              type: [string, 'null']
            draftRevision:
              oneOf:
                - $ref: '#/components/schemas/ExpertRevision'
                - type: 'null'
    ExpertRevision:
      type: object
      required:
        - id
        - expertId
        - revision
        - organizationInstructions
        - model
        - capabilities
        - toolPolicy
        - launchGuidance
        - workerDefinitions
        - triggerDefinitions
        - approvalPolicy
        - checksum
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        expertId:
          type: string
          format: uuid
        revision:
          type: integer
          minimum: 1
        baseRevisionId:
          type: [string, 'null']
          format: uuid
        managedInstructions:
          type: [string, 'null']
          readOnly: true
        organizationInstructions:
          type: string
          maxLength: 100000
        model:
          type: string
        capabilities:
          type: array
          uniqueItems: true
          items:
            type: string
        toolPolicy:
          $ref: '#/components/schemas/JsonObject'
        environmentId:
          type: [string, 'null']
          format: uuid
        environmentRevisionId:
          type: [string, 'null']
          format: uuid
        launchGuidance:
          type: string
          maxLength: 10000
        workerDefinitions:
          type: array
          items:
            $ref: '#/components/schemas/WorkerDefinition'
        triggerDefinitions:
          type: array
          items:
            $ref: '#/components/schemas/TriggerDefinition'
        approvalPolicy:
          $ref: '#/components/schemas/JsonObject'
        checksum:
          type: string
        publishedAt:
          type: [string, 'null']
          format: date-time
        publishedBy:
          type: [string, 'null']
          format: uuid
        createdAt:
          $ref: '#/components/schemas/Timestamp'
    ExpertCreate:
      type: object
      required: [kind, name]
      properties:
        kind:
          type: string
          enum: [managed_template, custom]
        upstreamTemplateId:
          type: string
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 2000
        visibility:
          type: string
          enum: [private, space]
          default: space
        draft:
          $ref: '#/components/schemas/ExpertDraftInput'
      additionalProperties: false
    ExpertPatch:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 2000
        visibility:
          type: string
          enum: [private, space]
        status:
          type: string
          enum: [published, disabled]
        draft:
          $ref: '#/components/schemas/ExpertDraftInput'
      additionalProperties: false
    ExpertDraftInput:
      type: object
      properties:
        organizationInstructions:
          type: string
          maxLength: 100000
        model:
          type: string
        capabilities:
          type: array
          uniqueItems: true
          items:
            type: string
        toolPolicy:
          $ref: '#/components/schemas/JsonObject'
        environmentId:
          type: [string, 'null']
          format: uuid
        launchGuidance:
          type: string
          maxLength: 10000
        workerDefinitions:
          type: array
          items:
            $ref: '#/components/schemas/WorkerDefinition'
        triggerDefinitions:
          type: array
          items:
            $ref: '#/components/schemas/TriggerDefinition'
        approvalPolicy:
          $ref: '#/components/schemas/JsonObject'
      additionalProperties: false
    WorkerDefinition:
      type: object
      required: [id, name, instructions, concurrency]
      properties:
        id:
          type: string
        name:
          type: string
        expertId:
          type: [string, 'null']
          format: uuid
        instructions:
          type: string
        concurrency:
          type: integer
          minimum: 1
          maximum: 32
    TriggerDefinition:
      type: object
      required: [id, source, eventType, enabled, filter]
      properties:
        id:
          type: string
        source:
          $ref: '#/components/schemas/EventSource'
        eventType:
          type: string
        enabled:
          type: boolean
        filter:
          $ref: '#/components/schemas/JsonObject'
        autoArchive:
          type: boolean

    EnvironmentStatus:
      type: string
      enum: [draft, provisioning, ready, updating, failed, disabled]
    Environment:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required: [spaceId, type, name, slug, status]
          properties:
            spaceId:
              type: string
              format: uuid
            type:
              type: string
              enum: [cloud, daemon]
            name:
              type: string
            slug:
              type: string
            status:
              $ref: '#/components/schemas/EnvironmentStatus'
            activeRevisionId:
              type: [string, 'null']
              format: uuid
            provisioning:
              $ref: '#/components/schemas/EnvironmentProvisioning'
            activeRevision:
              oneOf:
                - $ref: '#/components/schemas/EnvironmentRevision'
                - type: 'null'
    EnvironmentRevision:
      type: object
      required: [id, environmentId, revision, image, repositoryBindings, variableReferences, hooks, networkPolicy, sharing, checksum, createdAt]
      properties:
        id:
          type: string
          format: uuid
        environmentId:
          type: string
          format: uuid
        revision:
          type: integer
          minimum: 1
        image:
          type: string
        repositoryBindings:
          type: array
          items:
            $ref: '#/components/schemas/RepositoryBinding'
        variableReferences:
          type: array
          items:
            $ref: '#/components/schemas/VariableReference'
        hooks:
          type: array
          items:
            $ref: '#/components/schemas/EnvironmentHook'
        networkPolicy:
          $ref: '#/components/schemas/NetworkPolicy'
        sharing:
          type: string
          enum: [private, space]
        daemonPoolId:
          type: [string, 'null']
          format: uuid
        enterpriseResourcePolicy:
          oneOf:
            - $ref: '#/components/schemas/JsonObject'
            - type: 'null'
        checksum:
          type: string
        createdAt:
          $ref: '#/components/schemas/Timestamp'
    EnvironmentProvisioning:
      type: object
      required: [phase, progress, message, updatedAt]
      properties:
        phase:
          type: string
          enum: [queued, pulling_image, configuring, ready, failed]
        progress:
          type: integer
          minimum: 0
          maximum: 100
        message:
          type: string
        updatedAt:
          $ref: '#/components/schemas/Timestamp'
    EnvironmentCreate:
      type: object
      required: [type, name, image]
      properties:
        type:
          type: string
          enum: [cloud, daemon]
        name:
          type: string
          minLength: 1
          maxLength: 120
        slug:
          type: string
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        image:
          type: string
          minLength: 1
        repositoryBindings:
          type: array
          items:
            $ref: '#/components/schemas/RepositoryBinding'
        variableReferences:
          type: array
          items:
            $ref: '#/components/schemas/VariableReference'
        hooks:
          type: array
          items:
            $ref: '#/components/schemas/EnvironmentHook'
        networkPolicy:
          $ref: '#/components/schemas/NetworkPolicy'
        sharing:
          type: string
          enum: [private, space]
          default: space
        daemonPoolId:
          type: string
          format: uuid
        enterpriseResourcePolicy:
          $ref: '#/components/schemas/JsonObject'
      additionalProperties: false
    EnvironmentPatch:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        image:
          type: string
        repositoryBindings:
          type: array
          items:
            $ref: '#/components/schemas/RepositoryBinding'
        variableReferences:
          type: array
          items:
            $ref: '#/components/schemas/VariableReference'
        hooks:
          type: array
          items:
            $ref: '#/components/schemas/EnvironmentHook'
        networkPolicy:
          $ref: '#/components/schemas/NetworkPolicy'
        sharing:
          type: string
          enum: [private, space]
        status:
          type: string
          enum: [ready, disabled]
        enterpriseResourcePolicy:
          oneOf:
            - $ref: '#/components/schemas/JsonObject'
            - type: 'null'
      additionalProperties: false
    RepositoryBinding:
      type: object
      required: [repositoryId, defaultBranch, mountPath]
      properties:
        repositoryId:
          type: string
          format: uuid
        defaultBranch:
          type: string
        mountPath:
          type: string
        readOnly:
          type: boolean
          default: false
    VariableReference:
      type: object
      required: [name, secretId]
      properties:
        name:
          type: string
          pattern: '^[A-Za-z_][A-Za-z0-9_]*$'
        secretId:
          type: string
          format: uuid
    EnvironmentHook:
      type: object
      required: [phase, command]
      properties:
        phase:
          type: string
          enum: [setup, start, stop]
        command:
          type: string
          maxLength: 10000
        timeoutSeconds:
          type: integer
          minimum: 1
          maximum: 3600
    NetworkPolicy:
      type: object
      required: [mode, allowedHosts]
      properties:
        mode:
          type: string
          enum: [restricted, allowlist, unrestricted]
        allowedHosts:
          type: array
          uniqueItems: true
          maxItems: 256
          items:
            type: string

    SessionStatus:
      type: string
      enum: [draft, queued, active, waiting, paused, completed, failed, canceled]
    SessionVisibility:
      type: string
      enum: [private, space]
    Session:
      allOf:
        - $ref: '#/components/schemas/ResourceBase'
        - type: object
          required:
            - spaceId
            - title
            - expertId
            - expertRevisionId
            - status
            - visibility
            - source
            - lastActivityAt
          properties:
            spaceId:
              type: string
              format: uuid
            title:
              type: string
            summary:
              type: string
            expertId:
              type: string
              format: uuid
            expertRevisionId:
              type: string
              format: uuid
            environmentId:
              type: [string, 'null']
              format: uuid
            environmentRevisionId:
              type: [string, 'null']
              format: uuid
            executionSnapshotId:
              type: [string, 'null']
            status:
              $ref: '#/components/schemas/SessionStatus'
            waitingReason:
              type: [string, 'null']
            visibility:
              $ref: '#/components/schemas/SessionVisibility'
            pinnedAt:
              type: [string, 'null']
              format: date-time
            pinFolderId:
              type: [string, 'null']
              format: uuid
            source:
              type: string
              enum: [manual, automation, worker_import]
            sourceEventId:
              type: [string, 'null']
              format: uuid
            automationId:
              type: [string, 'null']
              format: uuid
            activeTurnId:
              type: [string, 'null']
              format: uuid
            startedAt:
              type: [string, 'null']
              format: date-time
            lastActivityAt:
              $ref: '#/components/schemas/Timestamp'
            completedAt:

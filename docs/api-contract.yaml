    get:
      tags: [Sessions]
      operationId: streamSessionEvents
      summary: Stream ordered Session events
      description: |
        Server-Sent Events. Reconnect with `Last-Event-ID`. Delivery is at least once;
        clients deduplicate by eventId and apply by monotonically increasing sequence.
      parameters:
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: integer
            format: int64
            minimum: 0
      responses:
        '200':
          description: SSE event stream
          headers:
            Cache-Control:
              schema:
                type: string
                const: no-cache
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                event:
                  value: |-
                    id: 42
                    event: turn.started
                    data: {"eventId":"019...","sequence":42,"occurredAt":"2026-07-12T08:00:00Z","resourceType":"turn","resourceId":"019...","payload":{}}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SpaceId:
      name: spaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExpertId:
      name: expertId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EnvironmentId:
      name: environmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RuntimeOrganizationId:
      name: organizationId
      in: path
      required: true
      description: Runtime Organization identifier.
      schema:
        $ref: '#/components/schemas/RuntimeIdentifier'
    RuntimeSpaceId:
      name: spaceId
      in: path
      required: true
      description: Runtime Space identifier.
      schema:
        $ref: '#/components/schemas/RuntimeIdentifier'
    RuntimeExpertId:
      name: expertId
      in: path
      required: true
      description: Runtime Expert identifier.
      schema:
        $ref: '#/components/schemas/RuntimeIdentifier'
    RuntimeEnvironmentId:
      name: environmentId
      in: path
      required: true
      description: Runtime Environment identifier.
      schema:
        $ref: '#/components/schemas/RuntimeIdentifier'
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/RuntimeIdentifier'
    TurnId:
      name: turnId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/RuntimeIdentifier'
    FileId:
      name: fileId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/RuntimeIdentifier'
    ArtifactId:
      name: artifactId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/RuntimeIdentifier'
    AutomationId:
      name: automationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubscriptionId:
      name: subscriptionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApprovalId:
      name: approvalId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/RuntimeIdentifier'
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque, signed cursor returned by the previous page.
      schema:
        type: string
        maxLength: 2048
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    SessionTimelineCursor:
      name: cursor
      in: query
      required: false
      description: Scope-bound base64url JSON cursor returned by or derived from this Session timeline.
      schema:
        type: string
        minLength: 1
        maxLength: 2048
    SessionMessageLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 100
    SessionEventLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
    RuntimeCatalogCursor:
      name: cursor
      in: query
      required: false
      description: Opaque base64url cursor scoped to this resource and Workspace.
      schema:
        type: string
        minLength: 1
        maxLength: 4096
        pattern: '^[A-Za-z0-9_-]+$'
    RuntimeCatalogLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Unique key scoped to organization, actor, method, and canonical path. Retained
        for at least 24 hours. Reuse with a different request body returns 409.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[\x21-\x7E]+$'
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: ETag from the last successful GET; required for optimistic concurrency.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'

  headers:
    ETag:
      description: Quoted integer resource version.
      schema:
        type: string
        example: '"7"'
    PrivateNoStore:
      description: Prevents private control-plane data from being stored by shared or browser caches.
      schema:
        type: string
        const: private, no-store
    VaryAuthorization:
      description: Prevents credentials from sharing a cached representation.
      schema:
        type: string
        const: Authorization
    BearerChallenge:
      description: Bearer authentication challenge for the Relay API.
      schema:
        type: string
        const: 'Bearer realm="relay-api"'
    RetryAfter:
      description: Minimum number of seconds the client should wait before reconnecting.
      schema:
        type: integer
        minimum: 1
        maximum: 3600
    Location:
      description: Canonical URL of the created resource.
      schema:
        type: string
        format: uri-reference
    RequestId:
      description: Correlation ID for logs and support.
      schema:
        type: string
    IdempotencyReplayed:
      description: True when the server replayed a stored idempotent response.
      schema:
        type: boolean

  responses:
    RuntimeCatalogBadRequest:
      description: Catalog query or request parameters are invalid
      headers:
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimeCatalogUnauthorized:
      description: Authentication is required or the bearer token is invalid
      headers:
        WWW-Authenticate:
          $ref: '#/components/headers/BearerChallenge'
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimeCatalogForbidden:
      description: The authenticated actor kind cannot enumerate control-plane configuration
      headers:
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimeCatalogNotFound:
      description: Resource, Workspace membership, or authorized representation was not found
      headers:
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimeCatalogInternalError:
      description: An unexpected server error occurred
      headers:
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimeBadRequest:
      description: Request parameters are invalid
      headers:
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimeUnauthorized:
      description: Authentication is required or the bearer token is invalid
      headers:
        WWW-Authenticate:
          $ref: '#/components/headers/BearerChallenge'
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimeForbidden:
      description: The authenticated actor is not permitted to perform this operation
      headers:
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimeNotFound:
      description: Resource, membership, or authorized representation was not found
      headers:
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimeConflict:
      description: The idempotency key was reused with a different request or the Session state cannot transition
      headers:
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimePreconditionFailed:
      description: If-Match does not equal the current Session version
      headers:
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimePreconditionRequired:
      description: The required If-Match header was not supplied
      headers:
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimePayloadTooLarge:
      description: The request body exceeds the configured limit
      headers:
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimeUnprocessable:
      description: The selected Expert or Environment cannot create an executable Session
      headers:
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimeTooManyRequests:
      description: This API instance has no available Session event stream capacity
      headers:
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimeInternalError:
      description: An unexpected server error occurred
      headers:
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
    RuntimeServiceUnavailable:
      description: Session execution is disabled or no Worker heartbeat is fresh enough to accept work
      headers:
        Cache-Control:
          $ref: '#/components/headers/PrivateNoStore'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RuntimeApiError'
          examples:
            executionUnavailable:
              value:
                code: EXECUTION_UNAVAILABLE
                message: Session execution is not currently available for this deployment.
                retryable: true
                correlationId: req-01JZEXAMPLE
    BadRequest:
      description: Validation failed
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Permission denied
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource not found or intentionally concealed by authorization
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Resource conflict, invalid state transition, or idempotency-key reuse
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    PreconditionFailed:
      description: If-Match does not equal the current resource version
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    CommandAccepted:
      description: Durable asynchronous command accepted
      headers:
        Idempotency-Replayed:
          $ref: '#/components/headers/IdempotencyReplayed'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Command'

  schemas:

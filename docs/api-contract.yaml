openapi: 3.1.0
info:
  title: Relay Agent OS API
  version: 0.1.0
  summary: Multi-tenant control-plane and Session API for Relay.
  description: |
    Contract for the Relay prototype backend. A Session is a persistent conversation;
    a Turn is one queued unit of Agent work; an Attempt is one execution of a Turn.
    Expert and Environment revisions are immutable once used by a Session.

    All timestamps are UTC RFC 3339. All list endpoints use opaque cursor pagination.
    POST operations that create a resource, enqueue a command, or cause an external
    side effect require `Idempotency-Key`. PATCH and one-time decisions require
    `If-Match` where documented.
  contact:
    name: Relay Engineering
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: https://api.relay.example/v1
    description: Production
  - url: http://127.0.0.1:8787/v1
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Identity
    description: Authenticated actor discovery and accessible Organization and Space memberships.
  - name: Organizations
    description: Tenant identity, lifecycle, region, and retention policy.
  - name: Spaces
    description: Resource boundaries, defaults, membership scope, and migration.
  - name: Experts
    description: Stable Expert identities and immutable executable revisions.
  - name: Environments
    description: Cloud or daemon execution templates and immutable revisions.
  - name: Sessions
    description: Persistent Expert conversations, messages, sharing, and lifecycle commands.
  - name: Turns
    description: FIFO units of Agent work and their retry Attempts.
  - name: Workers
    description: Delegated child Agent work within a parent Session.
  - name: ToolCalls
    description: Redacted, policy-controlled calls to external capabilities.
  - name: Files
    description: Read-only browsing of Workspace, User, and Organization Files and versions.
  - name: Artifacts
    description: Searchable Session deliverables and external references.
  - name: Automations
    description: Management projections over the canonical Triggers stored in Expert revisions.
  - name: Events
    description: Immutable external inputs, matching, dispatch, and replay diagnostics.
  - name: Subscriptions
    description: Runtime listeners that deliver future Events into an existing Session.
  - name: Approvals
    description: Human decisions that gate an exact high-risk ToolCall input.

paths:
  /me:
    get:
      tags: [Identity]
      operationId: getCurrentActor
      summary: Discover the authenticated actor and accessible workspaces
      description: |
        Returns the authenticated actor and only the Organization and Space memberships
        currently visible to that actor. Organization and Space IDs are unique within
        their respective arrays.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated actor and accessible memberships
          headers:
            Cache-Control:
              description: Prevents identity and authorization data from being cached.
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /organizations/{organizationId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Organizations]
      operationId: getOrganization
      summary: Get an organization
      responses:
        '200':
          description: Organization
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Organizations]
      operationId: updateOrganization
      summary: Update an organization
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/OrganizationPatch'
      responses:
        '200':
          description: Updated organization
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /organizations/{organizationId}/spaces:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Spaces]
      operationId: listSpaces
      summary: List accessible spaces
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Space page
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Space'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Spaces]
      operationId: createSpace
      summary: Create a space
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpaceCreate'
      responses:
        '201':
          description: Space created
          headers:
            Location:
              $ref: '#/components/headers/Location'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Space'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organizationId}/spaces/{spaceId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
    get:
      tags: [Spaces]
      operationId: getSpace
      summary: Get a space
      responses:
        '200':
          description: Space
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Space'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Spaces]
      operationId: updateSpace
      summary: Update defaults or metadata for a space
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/SpacePatch'
      responses:
        '200':
          description: Updated space
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Space'
        '400':
          $ref: '#/components/responses/BadRequest'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      tags: [Spaces]
      operationId: deleteSpace
      summary: Migrate resources and delete a non-default space
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - name: migrationTargetSpaceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          $ref: '#/components/responses/CommandAccepted'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /organizations/{organizationId}/spaces/{spaceId}/experts:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
    get:
      tags: [Experts]
      operationId: listExperts
      summary: List Experts
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ExpertStatus'
        - name: kind
          in: query
          schema:
            $ref: '#/components/schemas/ExpertKind'
      responses:
        '200':
          description: Expert page
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Expert'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Experts]
      operationId: createExpert
      summary: Create a Custom Expert draft or managed-template customization
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpertCreate'
      responses:
        '201':
          description: Expert created
          headers:
            Location:
              $ref: '#/components/headers/Location'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expert'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organizationId}/spaces/{spaceId}/experts/{expertId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/ExpertId'
    get:
      tags: [Experts]
      operationId: getExpert
      summary: Get an Expert and its draft/published revision pointers
      responses:
        '200':
          description: Expert
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expert'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Experts]
      operationId: updateExpertDraft
      summary: Update the mutable draft revision
      description: Managed-template base instructions cannot be changed by this operation.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/ExpertPatch'
      responses:
        '200':
          description: Updated Expert draft
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expert'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      tags: [Experts]
      operationId: archiveExpert
      summary: Archive an Expert
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Expert archived
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /organizations/{organizationId}/spaces/{spaceId}/experts/{expertId}/publish:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/ExpertId'
    post:
      tags: [Experts]
      operationId: publishExpert
      summary: Validate and publish the current draft as an immutable revision
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '201':
          description: Published revision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpertRevision'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /organizations/{organizationId}/spaces/{spaceId}/experts/{expertId}/revisions:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/ExpertId'
    get:
      tags: [Experts]
      operationId: listExpertRevisions
      summary: List immutable Expert revisions
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Expert revision page
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExpertRevision'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/spaces/{spaceId}/environments:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
    get:
      tags: [Environments]
      operationId: listEnvironments
      summary: List Cloud and self-hosted Environments
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
        - name: type
          in: query
          schema:
            type: string
            enum: [cloud, daemon]
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/EnvironmentStatus'
      responses:
        '200':
          description: Environment page
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Environment'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Environments]
      operationId: createEnvironment
      summary: Create and provision an Environment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnvironmentCreate'
      responses:
        '202':
          description: Environment and provisioning command accepted
          content:
            application/json:
              schema:
                type: object
                required: [environment, command]
                properties:
                  environment:
                    $ref: '#/components/schemas/Environment'
                  command:
                    $ref: '#/components/schemas/Command'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organizationId}/spaces/{spaceId}/environments/{environmentId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/EnvironmentId'
    get:
      tags: [Environments]
      operationId: getEnvironment
      summary: Get an Environment
      responses:
        '200':
          description: Environment
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Environments]
      operationId: updateEnvironment
      summary: Create and provision a new immutable Environment revision
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/EnvironmentPatch'
      responses:
        '202':
          description: Update accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Command'
        '400':
          $ref: '#/components/responses/BadRequest'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      tags: [Environments]
      operationId: deleteEnvironment
      summary: Schedule deletion of an unreferenced Environment
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          $ref: '#/components/responses/CommandAccepted'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organizationId}/spaces/{spaceId}/sessions:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
    get:
      tags: [Sessions]
      operationId: listSessions
      summary: List current or archived Sessions visible to the caller
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
        - name: archived
          in: query
          schema:
            type: boolean
            default: false
        - name: status
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/SessionStatus'
          style: form
          explode: false
        - name: expertId
          in: query
          schema:
            type: string
            format: uuid
        - name: source
          in: query
          schema:
            type: string
            enum: [manual, automation, worker_import]
        - name: visibility
          in: query
          schema:
            $ref: '#/components/schemas/SessionVisibility'
        - name: updatedAfter
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Session page
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Session'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Sessions]
      operationId: createSession
      summary: Create a draft or queued Session from a published Expert
      description: |
        `start=true` atomically creates the Session, first user Message and first Turn.
        The server resolves and fixes the published Expert and Environment revisions.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreate'
      responses:
        '201':
          description: Session created
          headers:
            Location:
              $ref: '#/components/headers/Location'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /organizations/{organizationId}/spaces/{spaceId}/sessions/{sessionId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Sessions]
      operationId: getSession
      summary: Get a Session
      responses:
        '200':
          description: Session
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Sessions]
      operationId: updateSession
      summary: Rename, pin, or change allowed Session metadata
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/SessionPatch'
      responses:
        '200':
          description: Updated Session
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          $ref: '#/components/responses/BadRequest'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /organizations/{organizationId}/spaces/{spaceId}/sessions/{sessionId}/start:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Sessions]
      operationId: startSession
      summary: Start a draft Session with its first message
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageCreate'
      responses:
        '202':
          description: First Turn queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnCommandResult'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /organizations/{organizationId}/spaces/{spaceId}/sessions/{sessionId}/messages:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Sessions]
      operationId: listSessionMessages
      summary: List Session messages in timeline order
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Message page
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Message'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Sessions]
      operationId: sendSessionMessage
      summary: Send or queue a message and create the next Turn
      description: If an Agent Turn is active, the new Turn is appended to the Session FIFO queue.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageCreate'
      responses:
        '202':
          description: Message accepted and Turn queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnCommandResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'

  /organizations/{organizationId}/spaces/{spaceId}/sessions/{sessionId}/pause:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Sessions]
      operationId: pauseSession
      summary: Pause a Session at the next safe point
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '202':
          $ref: '#/components/responses/CommandAccepted'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organizationId}/spaces/{spaceId}/sessions/{sessionId}/resume:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Sessions]
      operationId: resumeSession
      summary: Resume a paused Session without replaying completed ToolCalls
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '202':
          $ref: '#/components/responses/CommandAccepted'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organizationId}/spaces/{spaceId}/sessions/{sessionId}/cancel:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Sessions]
      operationId: cancelSession
      summary: Cancel active and queued work in a Session
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 1000
      responses:
        '202':
          $ref: '#/components/responses/CommandAccepted'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organizationId}/spaces/{spaceId}/sessions/{sessionId}/archive:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SpaceId'
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Sessions]
      operationId: archiveSession
      summary: Archive a Session without deleting its content
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'

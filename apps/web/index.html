<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0e1012" />
    <meta
      name="description"
      content="Relay - 面向研发团队的 AI 软件交付编排与治理工作台"
    />
    <script>
      try {
        const theme = localStorage.getItem('relay.theme') || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
        const locale = localStorage.getItem('relay.locale') || (navigator.language.toLowerCase().startsWith('zh') ? 'zh' : 'en')
        document.documentElement.dataset.theme = theme
        document.documentElement.lang = locale === 'zh' ? 'zh-CN' : 'en'
      } catch {}
    </script>
    <title>Relay Agent Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
